services:
  - type: web
    name: dashboard-project-backend
    runtime: docker
    region: oregon
    healthCheckPath: /
    envVars:
      - key: DASHBOARD_DATA_DIR
        value: /tmp/dashboard-data
      - key: AUTH_DB_PATH
        value: /tmp/dashboard-data/dashboard_auth.sqlite3
      - key: SAMPLE_WORKBOOK_PATH
        value: /tmp/dashboard-data/sample_data.xlsx
      - key: CLEANED_WORKBOOK_PATH
        value: /tmp/dashboard-data/cleaned_data.xlsx
      - key: DEFAULT_ADMIN_EMAIL
        value: employee1001@example.com
